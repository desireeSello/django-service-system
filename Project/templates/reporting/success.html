<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Submitted | CityMenderSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-lg w-full text-center">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Report Submitted!</h1>
        <p class="text-gray-600 mb-6">Thank you for helping improve our city.</p>
        
        <div class="bg-blue-50 border-2 border-blue-200 rounded-lg p-4 mb-6">
            <p class="text-sm text-blue-600 font-semibold mb-1">Your Reference Number</p>
            <p class="text-2xl font-mono font-bold text-blue-800 select-all">{{ issue.reference_number }}</p>
        </div>
        
        <div class="space-y-3">
            <a href="{% url 'tracking:track_issue' issue.reference_number %}" 
               class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                 Track Your Report
            </a>
            <a href="{% url 'reporting:homepage' %}" 
               class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-lg transition">
                Back to Homepage
            </a>
        </div>
    </div>

</body>
</html>
